<!-- Placeholder SVG for products -->
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#f3f4f6"/>
  <g transform="translate(200,200)">
    <!-- Angel wings -->
    <path d="M-60,-40 Q-80,-60 -100,-40 Q-90,-20 -60,-30 Z" fill="#e5e7eb" opacity="0.7"/>
    <path d="M60,-40 Q80,-60 100,-40 Q90,-20 60,-30 Z" fill="#e5e7eb" opacity="0.7"/>
    
    <!-- Halo -->
