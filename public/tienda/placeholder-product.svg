    <!-- Body -->
    <rect x="-10" y="-15" width="20" height="30" fill="#e5e7eb" rx="5"/>
    
    <!-- Text -->
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">
      Imagen de Producto
    </text>
    <text x="0" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d1d5db">
      Tienda Angelical
    </text>
  </g>
